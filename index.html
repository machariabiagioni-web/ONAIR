<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONAIR - Walkie Talkie</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        #status { margin-bottom: 20px; color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #channel-info { font-size: 1.2rem; margin-bottom: 20px; }
        #ptt-btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid #333;
            background: #cc0000; color: white; font-weight: bold; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.6); transition: 0.1s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #ptt-btn:active { background: #ff0000; transform: scale(0.92); box-shadow: 0 0 40px #ff0000; border-color: #555; }
        #ptt-btn:disabled { background: #444; border-color: #222; cursor: not-allowed; opacity: 0.5; }
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; text-align: center; font-size: 1rem; width: 200px; background: #333; color: white; }
        button#join-btn { padding: 10px 25px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">Sconnesso dal Server</div>
    <div id="channel-info">Canale: <span id="current-channel">---</span></div>
    
    <input type="number" id="channel-input" placeholder="Numero Canale">
    <button id="join-btn" onclick="joinChannel()">ENTRA</button>
    
    <br><br>
    <button id="ptt-btn" disabled>PREMI PER PARLARE</button>

    <script src="app.js"></script>
</body>
</html>
